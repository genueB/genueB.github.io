<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수온 정보</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f0f7ff;
            color: #111;
            min-height: 100vh;
        }

        .wrap {
            max-width: 960px;
            margin: 0 auto;
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        header h1 { font-size: 24px; font-weight: 700; }
        header p  { margin-top: 6px; font-size: 14px; color: #555; }

        .card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 1px 6px rgba(0,0,0,.08);
            padding: 20px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: #1a3c5e;
            margin-bottom: 14px;
        }

        /* 권역 탭 */
        .tab-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }

        .tab-btn {
            padding: 6px 14px;
            border: 2px solid #d1e3f8;
            border-radius: 20px;
            background: #f0f7ff;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            color: #1a3c5e;
            transition: all .15s;
        }

        .tab-btn:hover  { border-color: #2563eb; background: #dbeafe; }
        .tab-btn.active { border-color: #2563eb; background: #2563eb; color: #fff; }

        /* 관측소 목록 */
        .station-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 8px;
        }

        .station-btn {
            padding: 10px 8px;
            border: 2px solid #d1e3f8;
            border-radius: 10px;
            background: #f8fbff;
            font-size: 13px;
            cursor: pointer;
            text-align: center;
            color: #1a3c5e;
            font-weight: 500;
            transition: all .15s;
            line-height: 1.4;
        }

        .station-btn:hover  { border-color: #2563eb; background: #dbeafe; }
        .station-btn.active { border-color: #2563eb; background: #2563eb; color: #fff; }

        .station-btn .sub-info {
            font-size: 11px;
            opacity: .7;
            margin-top: 2px;
        }

        /* 수온 히어로 */
        .layer-row {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 12px;
        }

        .layer-card {
            background: #f0f7ff;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }

        .layer-card .lc-title {
            font-size: 13px;
            font-weight: 600;
            color: #1a3c5e;
            margin-bottom: 8px;
        }

        .layer-card .lc-temp {
            font-size: 48px;
            font-weight: 700;
            line-height: 1;
        }

        .layer-card .lc-unit {
            font-size: 20px;
            font-weight: 400;
        }

        .layer-card .lc-time {
            font-size: 11px;
            color: #aaa;
            margin-top: 6px;
        }

        .layer-card .lc-depth {
            font-size: 11px;
            color: #888;
            margin-top: 2px;
        }

        /* 차트 */
        .chart-wrap { overflow-x: auto; padding-bottom: 4px; }

        .chart-legend {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 10px;
            font-size: 12px;
            color: #444;
        }

        .legend-item {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .legend-line {
            display: inline-block;
            width: 20px;
            height: 2.5px;
            border-radius: 2px;
        }

        /* Alert / Empty */
        .alert {
            border-radius: 10px;
            padding: 12px 14px;
            font-size: 14px;
        }

        .alert-error {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #991b1b;
        }

        .empty { font-size: 14px; color: #888; }

        /* Skeleton */
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

        .skeleton {
            background: #e5e7eb;
            border-radius: 8px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        /* Repair badge */
        .badge-repair {
            display: inline-block;
            background: #fef9c3;
            color: #854d0e;
            border: 1px solid #fde68a;
            border-radius: 6px;
            padding: 2px 8px;
            font-size: 12px;
            margin-left: 6px;
        }

        footer { font-size: 12px; color: #aaa; }

        @media (max-width: 500px) {
            .temp-value { font-size: 56px; }
        }
    </style>
</head>

<body>
    <div class="wrap">

        <header>
            <h1>🌊 수온 정보</h1>
            <p>국립 해양 관측소 실시간 수온 데이터 (WhatsTheTemper)</p>
        </header>

        <!-- 관측소 선택 -->
        <div class="card">
            <div class="card-title">관측소 선택</div>
            <div class="tab-row" id="tabRow"></div>
            <div class="station-grid" id="stationGrid">
                <div class="skeleton" style="height:56px;"></div>
                <div class="skeleton" style="height:56px;"></div>
                <div class="skeleton" style="height:56px;"></div>
                <div class="skeleton" style="height:56px;"></div>
            </div>
        </div>

        <!-- 현재 수온 -->
        <div class="card">
            <div class="card-title">최근 관측값</div>
            <div id="currentArea">
                <p class="empty">관측소를 선택하면 데이터가 표시됩니다.</p>
            </div>
        </div>

        <!-- 수온 추이 차트 -->
        <div class="card">
            <div class="card-title">수온 추이 (오늘)</div>
            <div id="chartArea">
                <p class="empty">관측소를 선택하면 차트가 표시됩니다.</p>
            </div>
        </div>

        <!-- 주간 수온 추이 -->
        <div class="card">
            <div class="card-title">주간 수온 추이 (7일 일평균)</div>
            <div id="weeklyChartArea">
                <p class="empty">관측소를 선택하면 차트가 표시됩니다.</p>
            </div>
        </div>

        <!-- 이번 주 수온 추이 -->
        <div class="card">
            <div class="card-title">이번 주 수온 추이 (월~일 일평균)</div>
            <div id="thisWeekChartArea">
                <p class="empty">관측소를 선택하면 차트가 표시됩니다.</p>
            </div>
        </div>

        <footer>출처: WhatsTheTemper Server — 30분 간격 수집 (매시 :10, :40)</footer>
    </div>

    <script>
        const BASE = "https://whatsthetemperserver.onrender.com";
        const LAYER_LABEL = { 1: "표층", 2: "중층", 3: "저층" };
        const LAYER_COLORS = { 1: "#2563eb", 2: "#16a34a", 3: "#ea580c" };

        let allStations = [];
        let activeGroup = null;
        let selectedStation = null;
        let todayObs = [];
        let weeklyObs = [];
        let thisWeekObs = [];

        // ── 초기화: 관측소 목록 로드 ──────────────────────────────
        async function init() {
            try {
                const res = await fetch(`${BASE}/observers`);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                allStations = await res.json();

                const groups = [...new Set(allStations.map(s => s.gru_nam))];
                activeGroup = groups[0];

                renderTabs(groups);
                renderStations();
            } catch (e) {
                document.getElementById("stationGrid").innerHTML =
                    `<div class="alert alert-error">관측소 목록 로드 실패: ${escHtml(e.message)}</div>`;
            }
        }

        function renderTabs(groups) {
            document.getElementById("tabRow").innerHTML = groups.map(g => `
                <button class="tab-btn${g === activeGroup ? ' active' : ''}"
                    onclick="switchGroup('${escHtml(g)}')">${g}</button>
            `).join("");
        }

        function switchGroup(group) {
            activeGroup = group;
            document.querySelectorAll(".tab-btn").forEach(b =>
                b.classList.toggle("active", b.textContent === group));
            renderStations();
        }

        function renderStations() {
            const filtered = allStations.filter(s => s.gru_nam === activeGroup);
            document.getElementById("stationGrid").innerHTML = filtered.map(s => {
                const layers = [
                    s.sur_tmp_yn ? `표층${s.sur_dep != null ? " " + s.sur_dep + "m" : ""}` : "",
                    s.mid_tmp_yn ? `중층${s.mid_dep != null ? " " + s.mid_dep + "m" : ""}` : "",
                    s.bot_tmp_yn ? `저층${s.bot_dep != null ? " " + s.bot_dep + "m" : ""}` : "",
                ].filter(Boolean).join(" · ");
                const isActive = selectedStation?.sta_cde === s.sta_cde;
                return `
                    <button class="station-btn${isActive ? ' active' : ''}"
                        onclick="selectStation('${escHtml(s.sta_cde)}')">
                        ${escHtml(s.sta_nam_kor)}
                        <div class="sub-info">${escHtml(layers)}</div>
                    </button>
                `;
            }).join("");
        }

        // ── 관측소 선택 → 데이터 로드 ─────────────────────────────
        async function selectStation(sta_cde) {
            selectedStation = allStations.find(s => s.sta_cde === sta_cde);
            renderStations();

            document.getElementById("currentArea").innerHTML = skeletons(2);
            document.getElementById("chartArea").innerHTML = skeletons(1);
            document.getElementById("weeklyChartArea").innerHTML = skeletons(1);
            document.getElementById("thisWeekChartArea").innerHTML = skeletons(1);

            try {
                const [todayRes, weeklyRes] = await Promise.all([
                    fetch(`${BASE}/today-observations?sta_cde=${encodeURIComponent(sta_cde)}`),
                    fetch(`${BASE}/weekly-observations?sta_cde=${encodeURIComponent(sta_cde)}`),
                ]);
                if (!todayRes.ok) throw new Error(`HTTP ${todayRes.status}`);
                if (!weeklyRes.ok) throw new Error(`HTTP ${weeklyRes.status}`);

                todayObs  = await todayRes.json();
                weeklyObs = await weeklyRes.json();

                renderCurrentData();
                renderChart();
                renderWeeklyChart();
            } catch (e) {
                const html = `<div class="alert alert-error">데이터 로드 실패: ${escHtml(e.message)}</div>`;
                document.getElementById("currentArea").innerHTML = html;
                document.getElementById("chartArea").innerHTML = html;
                document.getElementById("weeklyChartArea").innerHTML = html;
            }

            try {
                const res = await fetch(`${BASE}/this-week-observations?sta_cde=${encodeURIComponent(sta_cde)}`);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                thisWeekObs = await res.json();
                renderThisWeekChart();
            } catch (e) {
                document.getElementById("thisWeekChartArea").innerHTML =
                    `<div class="alert alert-error">이번 주 데이터 로드 실패: ${escHtml(e.message)}</div>`;
            }
        }

        // ── 현재 관측값 렌더 (표층·중층·저층 동시 표시) ────────────
        function renderCurrentData() {
            // todayObs는 obs_tim asc 정렬 → 같은 계층 중 마지막이 최신값
            const latestByLayer = {};
            todayObs.forEach(o => { latestByLayer[o.obs_lay] = o; });

            const layers = Object.keys(latestByLayer).map(Number).sort();

            if (layers.length === 0) {
                document.getElementById("currentArea").innerHTML =
                    '<p class="empty">오늘 관측된 데이터가 없습니다.</p>';
                return;
            }

            const DEPTH_KEY = { 1: "sur_dep", 2: "mid_dep", 3: "bot_dep" };

            const cards = layers.map(layer => {
                const latest = latestByLayer[layer];
                const tmp = latest?.wtr_tmp;
                const tmpColor = tmp == null ? "#aaa"
                    : tmp < 10 ? "#1d4ed8"
                    : tmp < 18 ? "#0284c7"
                    : tmp < 24 ? "#0891b2"
                    : "#ef4444";
                const depth = selectedStation?.[DEPTH_KEY[layer]];
                const timeStr = latest?.obs_dat && latest?.obs_tim
                    ? `${latest.obs_dat} ${latest.obs_tim.slice(0, 5)}`
                    : "—";
                const repairBadge = latest?.repair_gbn === 2
                    ? `<span class="badge-repair">점검 중</span>` : "";

                return `
                    <div class="layer-card">
                        <div class="lc-title">${LAYER_LABEL[layer] ?? `계층${layer}`} ${repairBadge}</div>
                        <div>
                            <span class="lc-temp" style="color:${tmpColor};">
                                ${tmp != null ? tmp.toFixed(1) : "—"}
                            </span><span class="lc-unit" style="color:${tmpColor};">°C</span>
                        </div>
                        <div class="lc-depth">${depth != null ? `수심 ${depth}m` : ""}</div>
                        <div class="lc-time">관측: ${escHtml(timeStr)}</div>
                    </div>
                `;
            }).join("");

            document.getElementById("currentArea").innerHTML =
                `<div class="layer-row">${cards}</div>`;
        }

        // ── 오늘 수온 추이 차트 (꺾은선, 1일 기준, 계층별) ──────────
        function renderChart() {
            const now = new Date();
            const todayStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;

            const validObs = todayObs.filter(o => o.wtr_tmp != null);

            if (validObs.length === 0) {
                document.getElementById("chartArea").innerHTML =
                    '<p class="empty">오늘 데이터가 없습니다.</p>';
                return;
            }

            // 계층별 {분: 수온} 맵 (API가 obs_tim asc 정렬)
            const byLayer = {};
            validObs.forEach(o => {
                if (!byLayer[o.obs_lay]) byLayer[o.obs_lay] = {};
                const [h, m] = o.obs_tim.split(':').map(Number);
                byLayer[o.obs_lay][h * 60 + m] = o.wtr_tmp;
            });

            const layers = Object.keys(byLayer).map(Number).sort();
            const allTemps = validObs.map(o => o.wtr_tmp);
            const minT = Math.floor(Math.min(...allTemps) - 0.5);
            const maxT = Math.ceil(Math.max(...allTemps) + 0.5);
            const tRange = maxT - minT || 1;

            const W = 760, H = 200;
            const PAD = { top: 16, right: 16, bottom: 28, left: 38 };
            const cW = W - PAD.left - PAD.right;
            const cH = H - PAD.top - PAD.bottom;

            const xOf = min => (min / 1410) * cW;   // 00:00=0 ~ 23:30=1410
            const yOf = t   => cH - ((t - minT) / tRange) * cH;

            let grid = '';
            for (let h = 0; h <= 23; h += 2) {
                const x = xOf(h * 60);
                grid += `<line x1="${x}" y1="0" x2="${x}" y2="${cH}" stroke="#e5e7eb" stroke-width="1"/>`;
                grid += `<text x="${x}" y="${cH + 18}" text-anchor="middle" font-size="10" fill="#999">${String(h).padStart(2,'0')}시</text>`;
            }

            let yAxis = '';
            for (let i = 0; i <= 4; i++) {
                const t = minT + (tRange * i / 4);
                const y = yOf(t);
                yAxis += `<line x1="0" y1="${y}" x2="${cW}" y2="${y}" stroke="#e5e7eb" stroke-width="1"/>`;
                yAxis += `<text x="-6" y="${y + 4}" text-anchor="end" font-size="10" fill="#999">${t.toFixed(1)}</text>`;
            }

            let paths = '', dots = '';
            layers.forEach(layer => {
                const color = LAYER_COLORS[layer] || '#888';
                const pts = Object.entries(byLayer[layer])
                    .map(([min, tmp]) => ({ x: xOf(Number(min)), y: yOf(tmp) }))
                    .sort((a, b) => a.x - b.x);

                if (pts.length === 0) return;

                const d = pts.map((p, i) => `${i === 0 ? 'M' : 'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
                paths += `<path d="${d}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>`;
                pts.forEach(p => {
                    dots += `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="2.5" fill="${color}"/>`;
                });
            });

            const legend = layers.map(l => `
                <span class="legend-item">
                    <span class="legend-line" style="background:${LAYER_COLORS[l] || '#888'};"></span>
                    ${LAYER_LABEL[l] ?? `계층${l}`}
                </span>
            `).join('');

            document.getElementById("chartArea").innerHTML = `
                <div class="chart-legend">${legend}</div>
                <div class="chart-wrap">
                    <svg viewBox="0 0 ${W} ${H}" style="width:100%;min-width:500px;display:block;">
                        <g transform="translate(${PAD.left},${PAD.top})">
                            ${grid}${yAxis}${paths}${dots}
                        </g>
                    </svg>
                </div>
                <p style="font-size:12px;color:#aaa;margin-top:6px;">
                    ${todayStr} · 범위: ${minT.toFixed(1)}°C ~ ${maxT.toFixed(1)}°C
                </p>
            `;
        }

        // ── 주간 수온 추이 차트 (7일 일평균, 수심별) ─────────────────
        function renderWeeklyChart() {
            if (weeklyObs.length === 0) {
                document.getElementById("weeklyChartArea").innerHTML =
                    '<p class="empty">주간 데이터가 없습니다.</p>';
                return;
            }

            const allTemps = weeklyObs.flatMap(d => [d.lay1, d.lay2, d.lay3].filter(v => v != null));
            if (allTemps.length === 0) {
                document.getElementById("weeklyChartArea").innerHTML =
                    '<p class="empty">주간 데이터가 없습니다.</p>';
                return;
            }

            const minT = Math.floor(Math.min(...allTemps) - 0.5);
            const maxT = Math.ceil(Math.max(...allTemps) + 0.5);
            const tRange = maxT - minT || 1;

            const W = 760, H = 200;
            const PAD = { top: 16, right: 16, bottom: 36, left: 38 };
            const cW = W - PAD.left - PAD.right;
            const cH = H - PAD.top - PAD.bottom;

            const n = weeklyObs.length;
            const xOf = i => n > 1 ? (i / (n - 1)) * cW : cW / 2;
            const yOf = t => cH - ((t - minT) / tRange) * cH;

            let grid = '';
            weeklyObs.forEach((d, i) => {
                const x = xOf(i);
                const label = d.date.slice(5); // MM-DD
                grid += `<line x1="${x.toFixed(1)}" y1="0" x2="${x.toFixed(1)}" y2="${cH}" stroke="#e5e7eb" stroke-width="1"/>`;
                grid += `<text x="${x.toFixed(1)}" y="${cH + 22}" text-anchor="middle" font-size="10" fill="#999">${label}</text>`;
            });

            let yAxis = '';
            for (let i = 0; i <= 4; i++) {
                const t = minT + (tRange * i / 4);
                const y = yOf(t);
                yAxis += `<line x1="0" y1="${y.toFixed(1)}" x2="${cW}" y2="${y.toFixed(1)}" stroke="#e5e7eb" stroke-width="1"/>`;
                yAxis += `<text x="-6" y="${(y + 4).toFixed(1)}" text-anchor="end" font-size="10" fill="#999">${t.toFixed(1)}</text>`;
            }

            let paths = '', dots = '';
            [1, 2, 3].forEach(layNum => {
                const key = `lay${layNum}`;
                const pts = weeklyObs
                    .map((d, i) => d[key] != null ? { x: xOf(i), y: yOf(d[key]) } : null)
                    .filter(Boolean);

                if (pts.length === 0) return;

                const color = LAYER_COLORS[layNum];
                const pathD = pts.map((p, i) => `${i === 0 ? 'M' : 'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
                paths += `<path d="${pathD}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>`;
                pts.forEach(p => {
                    dots += `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="3" fill="${color}"/>`;
                });
            });

            const activeLayers = [1, 2, 3].filter(l =>
                weeklyObs.some(d => d[`lay${l}`] != null)
            );
            const legend = activeLayers.map(l => `
                <span class="legend-item">
                    <span class="legend-line" style="background:${LAYER_COLORS[l]};"></span>
                    ${LAYER_LABEL[l]}
                </span>
            `).join('');

            const dateRange = `${weeklyObs[0].date} ~ ${weeklyObs[weeklyObs.length - 1].date}`;

            document.getElementById("weeklyChartArea").innerHTML = `
                <div class="chart-legend">${legend}</div>
                <div class="chart-wrap">
                    <svg viewBox="0 0 ${W} ${H}" style="width:100%;min-width:500px;display:block;">
                        <g transform="translate(${PAD.left},${PAD.top})">
                            ${grid}${yAxis}${paths}${dots}
                        </g>
                    </svg>
                </div>
                <p style="font-size:12px;color:#aaa;margin-top:6px;">${dateRange} · 수심별 일평균 수온</p>
            `;
        }

        // ── 이번 주 수온 추이 차트 (월~일 고정, 수심별) ──────────────
        function renderThisWeekChart() {
            if (!thisWeekObs || thisWeekObs.length === 0) {
                document.getElementById("thisWeekChartArea").innerHTML =
                    '<p class="empty">이번 주 데이터가 없습니다.</p>';
                return;
            }

            const allTemps = thisWeekObs.flatMap(d => [d.lay1, d.lay2, d.lay3].filter(v => v != null));
            if (allTemps.length === 0) {
                document.getElementById("thisWeekChartArea").innerHTML =
                    '<p class="empty">이번 주 아직 데이터가 없습니다.</p>';
                return;
            }

            const now = new Date();
            const todayStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
            const DAY_KOR = ['일', '월', '화', '수', '목', '금', '토'];

            const minT = Math.floor(Math.min(...allTemps) - 0.5);
            const maxT = Math.ceil(Math.max(...allTemps) + 0.5);
            const tRange = maxT - minT || 1;

            const W = 760, H = 200;
            const PAD = { top: 16, right: 16, bottom: 42, left: 38 };
            const cW = W - PAD.left - PAD.right;
            const cH = H - PAD.top - PAD.bottom;

            const xOf = i => (i / 6) * cW;
            const yOf = t => cH - ((t - minT) / tRange) * cH;

            let grid = '';
            thisWeekObs.forEach((d, i) => {
                const x = xOf(i);
                const date = new Date(d.date + 'T12:00:00');
                const dayLabel = DAY_KOR[date.getDay()];
                const datePart = d.date.slice(5);
                const isToday = d.date === todayStr;
                const lineColor = isToday ? '#bfdbfe' : '#e5e7eb';
                const textColor = isToday ? '#2563eb' : '#999';
                const fontWeight = isToday ? '600' : '400';
                grid += `<line x1="${x.toFixed(1)}" y1="0" x2="${x.toFixed(1)}" y2="${cH}" stroke="${lineColor}" stroke-width="${isToday ? 2 : 1}"/>`;
                grid += `<text x="${x.toFixed(1)}" y="${cH + 16}" text-anchor="middle" font-size="12" fill="${textColor}" font-weight="${fontWeight}">${dayLabel}</text>`;
                grid += `<text x="${x.toFixed(1)}" y="${cH + 30}" text-anchor="middle" font-size="10" fill="${isToday ? '#60a5fa' : '#bbb'}">${datePart}</text>`;
            });

            let yAxis = '';
            for (let i = 0; i <= 4; i++) {
                const t = minT + (tRange * i / 4);
                const y = yOf(t);
                yAxis += `<line x1="0" y1="${y.toFixed(1)}" x2="${cW}" y2="${y.toFixed(1)}" stroke="#e5e7eb" stroke-width="1"/>`;
                yAxis += `<text x="-6" y="${(y + 4).toFixed(1)}" text-anchor="end" font-size="10" fill="#999">${t.toFixed(1)}</text>`;
            }

            let paths = '', dots = '';
            [1, 2, 3].forEach(layNum => {
                const key = `lay${layNum}`;
                const color = LAYER_COLORS[layNum];

                let pathD = '';
                thisWeekObs.forEach((d, i) => {
                    if (d[key] == null) return;
                    const x = xOf(i).toFixed(1);
                    const y = yOf(d[key]).toFixed(1);
                    const prevHasData = i > 0 && thisWeekObs[i - 1][key] != null;
                    pathD += `${prevHasData ? 'L' : 'M'}${x},${y} `;
                });

                if (!pathD) return;

                paths += `<path d="${pathD.trim()}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>`;

                thisWeekObs.forEach((d, i) => {
                    if (d[key] == null) return;
                    const x = xOf(i).toFixed(1);
                    const y = yOf(d[key]).toFixed(1);
                    const isToday = d.date === todayStr;
                    if (isToday) {
                        dots += `<circle cx="${x}" cy="${y}" r="5" fill="${color}" stroke="white" stroke-width="2"/>`;
                    } else {
                        dots += `<circle cx="${x}" cy="${y}" r="3" fill="${color}"/>`;
                    }
                });
            });

            const activeLayers = [1, 2, 3].filter(l =>
                thisWeekObs.some(d => d[`lay${l}`] != null)
            );
            const legend = activeLayers.map(l => `
                <span class="legend-item">
                    <span class="legend-line" style="background:${LAYER_COLORS[l]};"></span>
                    ${LAYER_LABEL[l]}
                </span>
            `).join('');

            const weekRange = `${thisWeekObs[0].date} ~ ${thisWeekObs[6].date}`;

            document.getElementById("thisWeekChartArea").innerHTML = `
                <div class="chart-legend">${legend}</div>
                <div class="chart-wrap">
                    <svg viewBox="0 0 ${W} ${H}" style="width:100%;min-width:500px;display:block;">
                        <g transform="translate(${PAD.left},${PAD.top})">
                            ${grid}${yAxis}${paths}${dots}
                        </g>
                    </svg>
                </div>
                <p style="font-size:12px;color:#aaa;margin-top:6px;">${weekRange} · 이번 주(월~일) 수심별 일평균 수온</p>
            `;
        }

        // ── 유틸 ─────────────────────────────────────────────────
        function skeletons(n) {
            return Array.from({ length: n }).map(() =>
                `<div class="skeleton" style="height:44px;margin-bottom:10px;"></div>`
            ).join("");
        }

        function escHtml(str) {
            return String(str ?? "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;");
        }

        init();
    </script>
</body>

</html>
