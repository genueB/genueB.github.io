<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수온 정보</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f0f7ff;
            color: #111;
            min-height: 100vh;
        }

        .wrap {
            max-width: 960px;
            margin: 0 auto;
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        header h1 { font-size: 24px; font-weight: 700; }
        header p  { margin-top: 6px; font-size: 14px; color: #555; }

        .card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 1px 6px rgba(0,0,0,.08);
            padding: 20px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: #1a3c5e;
            margin-bottom: 14px;
        }

        /* 권역 탭 */
        .tab-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }

        .tab-btn {
            padding: 6px 14px;
            border: 2px solid #d1e3f8;
            border-radius: 20px;
            background: #f0f7ff;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            color: #1a3c5e;
            transition: all .15s;
        }

        .tab-btn:hover  { border-color: #2563eb; background: #dbeafe; }
        .tab-btn.active { border-color: #2563eb; background: #2563eb; color: #fff; }

        /* 관측소 목록 */
        .station-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 8px;
        }

        .station-btn {
            padding: 10px 8px;
            border: 2px solid #d1e3f8;
            border-radius: 10px;
            background: #f8fbff;
            font-size: 13px;
            cursor: pointer;
            text-align: center;
            color: #1a3c5e;
            font-weight: 500;
            transition: all .15s;
            line-height: 1.4;
        }

        .station-btn:hover  { border-color: #2563eb; background: #dbeafe; }
        .station-btn.active { border-color: #2563eb; background: #2563eb; color: #fff; }

        .station-btn .sub-info {
            font-size: 11px;
            opacity: .7;
            margin-top: 2px;
        }

        /* 수온 히어로 */
        .layer-row {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 12px;
        }

        .layer-card {
            background: #f0f7ff;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }

        .layer-card .lc-title {
            font-size: 13px;
            font-weight: 600;
            color: #1a3c5e;
            margin-bottom: 8px;
        }

        .layer-card .lc-temp {
            font-size: 48px;
            font-weight: 700;
            line-height: 1;
        }

        .layer-card .lc-unit {
            font-size: 20px;
            font-weight: 400;
        }

        .layer-card .lc-time {
            font-size: 11px;
            color: #aaa;
            margin-top: 6px;
        }

        .layer-card .lc-depth {
            font-size: 11px;
            color: #888;
            margin-top: 2px;
        }

        /* 차트 */
        .chart-wrap { overflow-x: auto; padding-bottom: 4px; }

        .chart-bar-area {
            display: flex;
            align-items: flex-end;
            gap: 5px;
            min-width: 520px;
            height: 150px;
        }

        .bar-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
        }

        .bar-val  { font-size: 10px; color: #1d4ed8; font-weight: 600; }
        .bar      { width: 100%; background: #93c5fd; border-radius: 4px 4px 0 0; min-height: 4px; }
        .bar.now  { background: #2563eb; }
        .bar-time { font-size: 10px; color: #888; white-space: nowrap; }

        /* Alert / Empty */
        .alert {
            border-radius: 10px;
            padding: 12px 14px;
            font-size: 14px;
        }

        .alert-error {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #991b1b;
        }

        .empty { font-size: 14px; color: #888; }

        /* Skeleton */
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

        .skeleton {
            background: #e5e7eb;
            border-radius: 8px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        /* Repair badge */
        .badge-repair {
            display: inline-block;
            background: #fef9c3;
            color: #854d0e;
            border: 1px solid #fde68a;
            border-radius: 6px;
            padding: 2px 8px;
            font-size: 12px;
            margin-left: 6px;
        }

        footer { font-size: 12px; color: #aaa; }

        @media (max-width: 500px) {
            .temp-value { font-size: 56px; }
        }
    </style>
</head>

<body>
    <div class="wrap">

        <header>
            <h1>🌊 수온 정보</h1>
            <p>국립 해양 관측소 실시간 수온 데이터 (WhatsTheTemper)</p>
        </header>

        <!-- 관측소 선택 -->
        <div class="card">
            <div class="card-title">관측소 선택</div>
            <div class="tab-row" id="tabRow"></div>
            <div class="station-grid" id="stationGrid">
                <div class="skeleton" style="height:56px;"></div>
                <div class="skeleton" style="height:56px;"></div>
                <div class="skeleton" style="height:56px;"></div>
                <div class="skeleton" style="height:56px;"></div>
            </div>
        </div>

        <!-- 현재 수온 -->
        <div class="card">
            <div class="card-title">최근 관측값</div>
            <div id="currentArea">
                <p class="empty">관측소를 선택하면 데이터가 표시됩니다.</p>
            </div>
        </div>

        <!-- 수온 추이 차트 -->
        <div class="card">
            <div class="card-title">수온 추이</div>
            <div id="chartArea">
                <p class="empty">관측소를 선택하면 차트가 표시됩니다.</p>
            </div>
        </div>

        <footer>출처: WhatsTheTemper Server — 30분 간격 수집 (매시 :10, :40)</footer>
    </div>

    <script>
        const BASE = "https://whatsthetemperserver.onrender.com";
        const LAYER_LABEL = { 1: "표층", 2: "중층", 3: "저층" };

        let allStations = [];
        let activeGroup = null;
        let selectedStation = null;
        let allObs = [];
        let activeLayer = 1;

        // ── 초기화: 관측소 목록 로드 ──────────────────────────────
        async function init() {
            try {
                const res = await fetch(`${BASE}/observers`);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                allStations = await res.json();

                const groups = [...new Set(allStations.map(s => s.gru_nam))];
                activeGroup = groups[0];

                renderTabs(groups);
                renderStations();
            } catch (e) {
                document.getElementById("stationGrid").innerHTML =
                    `<div class="alert alert-error">관측소 목록 로드 실패: ${escHtml(e.message)}</div>`;
            }
        }

        function renderTabs(groups) {
            document.getElementById("tabRow").innerHTML = groups.map(g => `
                <button class="tab-btn${g === activeGroup ? ' active' : ''}"
                    onclick="switchGroup('${escHtml(g)}')">${g}</button>
            `).join("");
        }

        function switchGroup(group) {
            activeGroup = group;
            document.querySelectorAll(".tab-btn").forEach(b =>
                b.classList.toggle("active", b.textContent === group));
            renderStations();
        }

        function renderStations() {
            const filtered = allStations.filter(s => s.gru_nam === activeGroup);
            document.getElementById("stationGrid").innerHTML = filtered.map(s => {
                const layers = [
                    s.sur_tmp_yn ? `표층${s.sur_dep != null ? " " + s.sur_dep + "m" : ""}` : "",
                    s.mid_tmp_yn ? `중층${s.mid_dep != null ? " " + s.mid_dep + "m" : ""}` : "",
                    s.bot_tmp_yn ? `저층${s.bot_dep != null ? " " + s.bot_dep + "m" : ""}` : "",
                ].filter(Boolean).join(" · ");
                const isActive = selectedStation?.sta_cde === s.sta_cde;
                return `
                    <button class="station-btn${isActive ? ' active' : ''}"
                        onclick="selectStation('${escHtml(s.sta_cde)}')">
                        ${escHtml(s.sta_nam_kor)}
                        <div class="sub-info">${escHtml(layers)}</div>
                    </button>
                `;
            }).join("");
        }

        // ── 관측소 선택 → 데이터 로드 ─────────────────────────────
        async function selectStation(sta_cde) {
            selectedStation = allStations.find(s => s.sta_cde === sta_cde);
            renderStations();

            document.getElementById("currentArea").innerHTML = skeletons(2);
            document.getElementById("chartArea").innerHTML = skeletons(1);

            try {
                const res = await fetch(`${BASE}/observations?sta_cde=${encodeURIComponent(sta_cde)}`);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                allObs = await res.json();

                // 사용 가능한 첫 번째 계층으로 초기화
                const availableLayers = [...new Set(allObs.map(o => o.obs_lay))].sort();
                activeLayer = availableLayers[0] ?? 1;

                renderCurrentData();
                renderChart();
            } catch (e) {
                const html = `<div class="alert alert-error">데이터 로드 실패: ${escHtml(e.message)}</div>`;
                document.getElementById("currentArea").innerHTML = html;
                document.getElementById("chartArea").innerHTML = html;
            }
        }

        // ── 현재 관측값 렌더 (표층·중층·저층 동시 표시) ────────────
        function renderCurrentData() {
            const availableLayers = [...new Set(allObs.map(o => o.obs_lay))].sort();

            if (availableLayers.length === 0) {
                document.getElementById("currentArea").innerHTML =
                    '<p class="empty">데이터가 없습니다.</p>';
                return;
            }

            const DEPTH_KEY = { 1: "sur_dep", 2: "mid_dep", 3: "bot_dep" };

            const cards = availableLayers.map(layer => {
                const latest = allObs.find(o => o.obs_lay === layer);
                const tmp = latest?.wtr_tmp;
                const tmpColor = tmp == null ? "#aaa"
                    : tmp < 10 ? "#1d4ed8"
                    : tmp < 18 ? "#0284c7"
                    : tmp < 24 ? "#0891b2"
                    : "#ef4444";
                const depth = selectedStation?.[DEPTH_KEY[layer]];
                const timeStr = latest?.obs_dat && latest?.obs_tim
                    ? `${latest.obs_dat} ${latest.obs_tim.slice(0, 5)}`
                    : "—";
                const repairBadge = latest?.repair_gbn === 2
                    ? `<span class="badge-repair">점검 중</span>` : "";

                return `
                    <div class="layer-card">
                        <div class="lc-title">${LAYER_LABEL[layer] ?? `계층${layer}`} ${repairBadge}</div>
                        <div>
                            <span class="lc-temp" style="color:${tmpColor};">
                                ${tmp != null ? tmp.toFixed(1) : "—"}
                            </span><span class="lc-unit" style="color:${tmpColor};">°C</span>
                        </div>
                        <div class="lc-depth">${depth != null ? `수심 ${depth}m` : ""}</div>
                        <div class="lc-time">관측: ${escHtml(timeStr)}</div>
                    </div>
                `;
            }).join("");

            document.getElementById("currentArea").innerHTML =
                `<div class="layer-row">${cards}</div>`;

            // 차트용 activeLayer를 첫 번째 계층으로 유지
            activeLayer = availableLayers[0];
        }

        // ── 수온 추이 차트 ────────────────────────────────────────
        function renderChart() {
            const layerObs = allObs.filter(o => o.obs_lay === activeLayer && o.wtr_tmp != null);

            if (layerObs.length === 0) {
                document.getElementById("chartArea").innerHTML =
                    '<p class="empty">차트 데이터가 없습니다.</p>';
                return;
            }

            // obs는 최신순 정렬 → 차트용으로 역순 (오래된 순)
            const slice = layerObs.slice(0, 48).reverse();
            const temps = slice.map(o => o.wtr_tmp);
            const maxT = Math.max(...temps);
            const minT = Math.min(...temps);
            const range = maxT - minT || 1;
            const chartH = 110;

            const bars = slice.map((o, i) => {
                const h = Math.max(6, ((o.wtr_tmp - minT) / range) * chartH);
                const timeStr = o.obs_tim?.slice(0, 5) ?? "";
                const isLatest = i === slice.length - 1;
                return `
                    <div class="bar-col">
                        ${isLatest ? `<div class="bar-val">${o.wtr_tmp.toFixed(1)}</div>` : `<div class="bar-val" style="visibility:hidden;">0</div>`}
                        <div class="bar${isLatest ? ' now' : ''}" style="height:${h}px;"></div>
                        <div class="bar-time">${escHtml(timeStr)}</div>
                    </div>
                `;
            }).join("");

            document.getElementById("chartArea").innerHTML = `
                <div class="chart-wrap">
                    <div class="chart-bar-area">${bars}</div>
                </div>
                <p style="font-size:12px;color:#aaa;margin-top:10px;">
                    ${LAYER_LABEL[activeLayer] ?? ""} · 최근 ${slice.length}회 관측 ·
                    범위: ${minT.toFixed(1)}°C ~ ${maxT.toFixed(1)}°C
                </p>
            `;
        }

        // ── 유틸 ─────────────────────────────────────────────────
        function skeletons(n) {
            return Array.from({ length: n }).map(() =>
                `<div class="skeleton" style="height:44px;margin-bottom:10px;"></div>`
            ).join("");
        }

        function escHtml(str) {
            return String(str ?? "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;");
        }

        init();
    </script>
</body>

</html>
