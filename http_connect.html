<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTTP 연결 테스트</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f9f9f9;
        }

        h1 {
            font-size: 22px;
            color: #333;
            margin-bottom: 24px;
        }

        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            align-items: center;
        }

        .input-row label {
            width: 50px;
            font-size: 15px;
            color: #555;
            flex-shrink: 0;
        }

        .input-row input {
            flex: 1;
            padding: 10px 12px;
            font-size: 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .connect-btn {
            width: 100%;
            padding: 14px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            margin-top: 8px;
        }

        .connect-btn:hover {
            background-color: #0056b3;
        }

        .connect-btn:disabled {
            background-color: #aaa;
            cursor: default;
        }

        .status-box {
            margin-top: 24px;
            padding: 16px;
            border-radius: 8px;
            font-size: 15px;
            display: none;
        }

        .status-box.success {
            background-color: #d4edda;
            border: 1px solid #28a745;
            color: #155724;
        }

        .status-box.error {
            background-color: #f8d7da;
            border: 1px solid #dc3545;
            color: #721c24;
        }

        .status-box.loading {
            background-color: #fff3cd;
            border: 1px solid #ffc107;
            color: #856404;
        }

        .note {
            margin-top: 20px;
            font-size: 13px;
            color: #888;
            line-height: 1.5;
        }
    </style>
</head>

<body>
    <h1>HTTP 연결 테스트</h1>

    <div class="input-row">
        <label>URL</label>
        <input type="text" id="urlInput" value="localhost" placeholder="예: localhost 또는 192.168.0.x">
    </div>
    <div class="input-row">
        <label>Port</label>
        <input type="number" id="portInput" value="3000" placeholder="3000">
    </div>

    <button class="connect-btn" id="connectBtn" onclick="connect()">연결</button>

    <div class="status-box" id="statusBox"></div>

    <hr style="margin: 28px 0; border: none; border-top: 1px solid #ddd;">

    <div class="input-row">
        <label>값</label>
        <input type="text" id="sendInput" placeholder="전송할 값을 입력하세요">
    </div>

    <button class="connect-btn" id="sendBtn" onclick="sendValue()" style="background-color: #28a745;">전송</button>

    <div class="status-box" id="sendStatusBox"></div>

    <div class="note">
        * GitHub Pages(HTTPS)에서 HTTP localhost 연결 시 브라우저의 혼합 콘텐츠 정책에 따라 차단될 수 있습니다.<br>
        * Flutter HttpServer에서 CORS 헤더(<code>Access-Control-Allow-Origin: *</code>)를 설정해야 합니다.
    </div>

    <script>
        async function connect() {
            const url = document.getElementById('urlInput').value.trim();
            const port = document.getElementById('portInput').value.trim();
            const btn = document.getElementById('connectBtn');
            const statusBox = document.getElementById('statusBox');

            if (!url || !port) {
                showStatus('URL과 Port를 모두 입력해주세요.', 'error');
                return;
            }

            const target = `http://${url}:${port}`;

            btn.disabled = true;
            showStatus(`${target} 에 연결 중...`, 'loading');

            try {
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 5000);

                const response = await fetch(target, {
                    method: 'GET',
                    signal: controller.signal,
                });

                clearTimeout(timeout);
                showStatus(`연결 성공! (${response.status} ${response.statusText})\n대상: ${target}`, 'success');
            } catch (error) {
                if (error.name === 'AbortError') {
                    showStatus(`연결 시간 초과 (5초)\n대상: ${target}`, 'error');
                } else {
                    showStatus(`연결 실패: ${error.message}\n대상: ${target}`, 'error');
                }
            } finally {
                btn.disabled = false;
            }
        }

        async function sendValue() {
            const url = document.getElementById('urlInput').value.trim();
            const port = document.getElementById('portInput').value.trim();
            const value = document.getElementById('sendInput').value.trim();
            const btn = document.getElementById('sendBtn');

            if (!url || !port) {
                showSendStatus('URL과 Port를 먼저 입력해주세요.', 'error');
                return;
            }

            const target = `http://${url}:${port}`;

            btn.disabled = true;
            showSendStatus(`전송 중...`, 'loading');

            try {
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 5000);

                const response = await fetch(target, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: value,
                    signal: controller.signal,
                });

                clearTimeout(timeout);
                const responseText = await response.text();
                showSendStatus(`전송 성공! (${response.status} ${response.statusText})\n응답: ${responseText || '(없음)'}`, 'success');
            } catch (error) {
                if (error.name === 'AbortError') {
                    showSendStatus(`전송 시간 초과 (5초)`, 'error');
                } else {
                    showSendStatus(`전송 실패: ${error.message}`, 'error');
                }
            } finally {
                btn.disabled = false;
            }
        }

        function showStatus(message, type) {
            const box = document.getElementById('statusBox');
            box.textContent = message;
            box.className = `status-box ${type}`;
            box.style.display = 'block';
            box.style.whiteSpace = 'pre-line';
        }

        function showSendStatus(message, type) {
            const box = document.getElementById('sendStatusBox');
            box.textContent = message;
            box.className = `status-box ${type}`;
            box.style.display = 'block';
            box.style.whiteSpace = 'pre-line';
        }
    </script>
</body>

</html>
